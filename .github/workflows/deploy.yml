name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -eu
            cd "${{ secrets.DEPLOY_PATH }}"
            git config --global http.version HTTP/1.1
            n=0
            until [ "$n" -ge 3 ]; do
              git fetch --verbose origin main && break
              n=$((n+1))
              echo "git fetch failed, retry $n/3" >&2
              sleep 3
            done
            [ "$n" -lt 3 ] || exit 1
            git checkout main
            git reset --hard origin/main
            npm ci --no-audit --no-fund || npm install --no-audit --no-fund
            npm run build
            pm2 restart "${{ secrets.DEPLOY_PM2_NAME || 'blogs-next' }}" --update-env || \
              PORT=8081 HOSTNAME=0.0.0.0 NODE_ENV=production \
              pm2 start ./.next/standalone/server.js \
                --name "${{ secrets.DEPLOY_PM2_NAME || 'blogs-next' }}" \
                --cwd "${{ secrets.DEPLOY_PATH }}" \
                --update-env
            pm2 save
