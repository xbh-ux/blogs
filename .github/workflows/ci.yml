name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  visual-regression:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Start app
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 &
          echo $! > .next-start.pid

      - name: Wait for app
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/api/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "app did not start in time" >&2
          exit 1

      - name: Check home layout
        env:
          VISUAL_BASE_URL: http://127.0.0.1:3000
        run: npm run visual:check

      - name: Upload visual artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-home-layout
          path: output/playwright/home-layout-check.png
          if-no-files-found: ignore

      - name: Stop app
        if: always()
        run: |
          if [ -f .next-start.pid ]; then
            kill "$(cat .next-start.pid)" || true
          fi
